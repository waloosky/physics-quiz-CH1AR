<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة الفيزياء الحديثة — الأستاذ وليد خالد الفتلاوي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Estedad:wght@100..900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep:        #0d1117;
    --bg-mid:         #0f1923;
    --bg-card:        rgba(255,255,255,0.04);
    --cyan:           #00e5ff;
    --cyan-dim:       rgba(0,229,255,0.15);
    --cyan-glow:      rgba(0,229,255,0.35);
    --amber:          #ffb300;
    --amber-dim:      rgba(255,179,0,0.15);
    --amber-glow:     rgba(255,179,0,0.4);
    --glass-border:   rgba(255,255,255,0.08);
    --glass-bg:       rgba(255,255,255,0.03);
    --text-primary:   #e8edf5;
    --text-secondary: #8b9ab5;
    --text-muted:     #4a5568;
    --radius-lg:      20px;
    --radius-xl:      32px;
    --transition:     0.35s cubic-bezier(0.23, 1, 0.32, 1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    scroll-behavior: smooth;
    scrollbar-width: none;
  }
  html::-webkit-scrollbar { display: none; }

  body {
    font-family: 'Estedad', sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    direction: rtl;
    position: relative;
  }

  /* ── Canvas Background ── */
  #particle-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ── Radial Glow Blobs ── */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.18;
    pointer-events: none;
    z-index: 0;
  }
  .blob-cyan  { width: 600px; height: 600px; background: var(--cyan);  top: -150px; right: -150px; animation: blobDrift 18s ease-in-out infinite alternate; }
  .blob-amber { width: 500px; height: 500px; background: var(--amber); bottom: -100px; left: -100px; animation: blobDrift 22s ease-in-out infinite alternate-reverse; }
  .blob-blue  { width: 400px; height: 400px; background: #1a4fff; top: 40%; left: 30%; animation: blobDrift 15s ease-in-out infinite alternate; }

  @keyframes blobDrift {
    0%   { transform: translate(0,0) scale(1); }
    100% { transform: translate(40px, 30px) scale(1.08); }
  }

  /* ── Layout Wrapper ── */
  .page-wrapper {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 36px;
  }

  /* ── Badge ── */
  .expertise-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, rgba(0,229,255,0.12), rgba(255,179,0,0.10));
    border: 1px solid rgba(0,229,255,0.25);
    border-radius: 50px;
    padding: 10px 22px;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--cyan);
    letter-spacing: 0.03em;
    animation: fadeSlideDown 0.7s var(--transition) both;
    text-align: center;
  }
  .badge-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--amber);
    box-shadow: 0 0 10px var(--amber);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity:1; transform: scale(1); }
    50%       { opacity:0.5; transform: scale(1.4); }
  }

  /* ── Hero Section ── */
  .hero {
    width: 100%;
    text-align: center;
    animation: fadeSlideDown 0.9s var(--transition) 0.1s both;
  }

  .hero-title {
    font-size: clamp(1.85rem, 5vw, 3.1rem);
    font-weight: 900;
    line-height: 1.25;
    background: linear-gradient(135deg, #ffffff 0%, var(--cyan) 50%, var(--amber) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 18px;
    text-shadow: none;
  }

  .hero-subtitle {
    font-size: clamp(0.88rem, 2.2vw, 1.05rem);
    font-weight: 400;
    color: var(--text-secondary);
    max-width: 620px;
    margin: 0 auto;
    line-height: 1.9;
  }
  .hero-subtitle strong {
    color: var(--amber);
    font-weight: 700;
  }

  /* ── Profile Orb ── */
  .profile-orb-wrapper {
    position: relative;
    width: 130px;
    height: 130px;
    margin: 0 auto 24px;
    animation: fadeSlideDown 0.8s var(--transition) 0.05s both;
  }
  .profile-orb {
    width: 130px; height: 130px;
    border-radius: 50%;
    background: linear-gradient(135deg, #0d2244, #0a3060);
    border: 2px solid rgba(0,229,255,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 3.5rem;
    position: relative;
    z-index: 2;
    box-shadow: 0 0 40px rgba(0,229,255,0.2), 0 0 80px rgba(0,229,255,0.08);
  }
  .orb-ring {
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    border: 1px solid rgba(0,229,255,0.2);
    animation: spinRing 8s linear infinite;
  }
  .orb-ring::before {
    content: '';
    position: absolute;
    top: -4px; left: 50%;
    transform: translateX(-50%);
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 12px var(--cyan);
  }
  .orb-ring-2 {
    position: absolute;
    inset: -22px;
    border-radius: 50%;
    border: 1px solid rgba(255,179,0,0.15);
    animation: spinRing 14s linear infinite reverse;
  }
  .orb-ring-2::before {
    content: '';
    position: absolute;
    bottom: -4px; right: 10%;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--amber);
    box-shadow: 0 0 10px var(--amber);
  }
  @keyframes spinRing { to { transform: rotate(360deg); } }

  /* ── Exam Card (Glassmorphism) ── */
  .exam-card {
    width: 100%;
    background: linear-gradient(135deg, rgba(0,229,255,0.04), rgba(255,179,0,0.03));
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-xl);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    padding: 36px 40px;
    position: relative;
    overflow: hidden;
    animation: fadeSlideUp 0.9s var(--transition) 0.2s both;
    transition: border-color var(--transition), box-shadow var(--transition);
  }
  .exam-card:hover {
    border-color: rgba(0,229,255,0.2);
    box-shadow: 0 0 60px rgba(0,229,255,0.07), 0 20px 60px rgba(0,0,0,0.4);
  }
  .exam-card::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(0,229,255,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .exam-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 150px; height: 150px;
    background: radial-gradient(circle, rgba(255,179,0,0.05) 0%, transparent 70%);
    pointer-events: none;
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  .card-icon {
    width: 48px; height: 48px;
    border-radius: 14px;
    background: linear-gradient(135deg, rgba(0,229,255,0.15), rgba(0,229,255,0.05));
    border: 1px solid rgba(0,229,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem;
    flex-shrink: 0;
  }
  .card-title {
    font-size: 1.25rem;
    font-weight: 800;
    color: var(--text-primary);
  }
  .card-subtitle-badge {
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--amber);
    background: var(--amber-dim);
    border: 1px solid rgba(255,179,0,0.2);
    padding: 3px 10px;
    border-radius: 30px;
    margin-top: 4px;
    display: inline-block;
  }

  .guidelines-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .guideline-item {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 16px 18px;
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 14px;
    transition: all var(--transition);
    cursor: default;
  }
  .guideline-item:hover {
    background: rgba(0,229,255,0.05);
    border-color: rgba(0,229,255,0.15);
    transform: translateX(-4px);
  }
  .guideline-num {
    min-width: 34px; height: 34px;
    border-radius: 10px;
    background: linear-gradient(135deg, rgba(0,229,255,0.2), rgba(0,229,255,0.08));
    border: 1px solid rgba(0,229,255,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem;
    font-weight: 800;
    color: var(--cyan);
    flex-shrink: 0;
  }
  .guideline-text {
    font-size: 0.92rem;
    font-weight: 400;
    color: var(--text-secondary);
    line-height: 1.75;
  }
  .guideline-text strong {
    color: var(--text-primary);
    font-weight: 700;
  }

  /* ── Primary CTA ── */
  .cta-wrapper {
    width: 100%;
    text-align: center;
    animation: fadeSlideUp 0.9s var(--transition) 0.3s both;
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    background: linear-gradient(135deg, #007aff 0%, #00b4ff 50%, var(--cyan) 100%);
    color: #fff;
    font-family: 'Estedad', sans-serif;
    font-size: clamp(1rem, 2.5vw, 1.25rem);
    font-weight: 800;
    padding: 20px 44px;
    border-radius: 60px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    position: relative;
    overflow: hidden;
    box-shadow:
      0 0 40px rgba(0,180,255,0.4),
      0 0 80px rgba(0,180,255,0.15),
      0 8px 32px rgba(0,0,0,0.4);
    transition: all var(--transition);
    letter-spacing: 0.02em;
  }
  .cta-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    opacity: 0;
    transition: opacity var(--transition);
  }
  .cta-btn:hover {
    transform: translateY(-4px) scale(1.03);
    box-shadow:
      0 0 60px rgba(0,229,255,0.6),
      0 0 120px rgba(0,229,255,0.2),
      0 16px 48px rgba(0,0,0,0.5);
  }
  .cta-btn:hover::before { opacity: 1; }
  .cta-btn:active { transform: translateY(-1px) scale(0.99); }

  .cta-icon {
    font-size: 1.4rem;
    animation: zapPulse 1.8s ease-in-out infinite;
  }
  @keyframes zapPulse {
    0%, 100% { transform: scale(1); filter: drop-shadow(0 0 4px var(--cyan)); }
    50%       { transform: scale(1.25); filter: drop-shadow(0 0 12px var(--cyan)); }
  }

  .cta-shine {
    position: absolute;
    top: 0; left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.18) 50%, transparent 70%);
    animation: shine 3s ease-in-out infinite;
  }
  @keyframes shine {
    0%   { left: -100%; }
    40%  { left: 120%; }
    100% { left: 120%; }
  }

  /* ── Contact Hub ── */
  .contact-hub {
    width: 100%;
    animation: fadeSlideUp 0.9s var(--transition) 0.35s both;
  }
  .contact-title {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    text-align: center;
    margin-bottom: 18px;
  }
  .contact-buttons {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .contact-btn {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 15px 28px;
    border-radius: 16px;
    border: 1px solid;
    font-family: 'Estedad', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    text-decoration: none;
    transition: all var(--transition);
    position: relative;
    overflow: hidden;
    direction: rtl;
  }
  .contact-btn-call {
    background: linear-gradient(135deg, rgba(52,199,89,0.12), rgba(52,199,89,0.05));
    border-color: rgba(52,199,89,0.3);
    color: #34c759;
  }
  .contact-btn-call:hover {
    background: linear-gradient(135deg, rgba(52,199,89,0.22), rgba(52,199,89,0.1));
    border-color: rgba(52,199,89,0.6);
    transform: translateY(-3px);
    box-shadow: 0 0 30px rgba(52,199,89,0.2), 0 8px 24px rgba(0,0,0,0.3);
  }
  .contact-btn-email {
    background: linear-gradient(135deg, rgba(255,179,0,0.12), rgba(255,179,0,0.05));
    border-color: rgba(255,179,0,0.3);
    color: var(--amber);
  }
  .contact-btn-email:hover {
    background: linear-gradient(135deg, rgba(255,179,0,0.22), rgba(255,179,0,0.1));
    border-color: rgba(255,179,0,0.6);
    transform: translateY(-3px);
    box-shadow: 0 0 30px rgba(255,179,0,0.2), 0 8px 24px rgba(0,0,0,0.3);
  }
  .btn-icon-circle {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
  }

  /* ── Social Footer ── */
  .social-section {
    width: 100%;
    animation: fadeSlideUp 0.9s var(--transition) 0.4s both;
  }
  .social-title {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    text-align: center;
    margin-bottom: 20px;
  }
  .social-grid {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 14px;
  }
  .social-link {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    transition: all var(--transition);
  }
  .social-link:hover { transform: translateY(-6px) scale(1.08); }

  .social-icon-wrap {
    width: 56px; height: 56px;
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem;
    border: 1px solid;
    position: relative;
    overflow: hidden;
    transition: all var(--transition);
  }
  .social-icon-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity var(--transition);
  }
  .social-link:hover .social-icon-wrap::after { opacity: 1; }

  .si-telegram { background: rgba(0,136,204,0.12); border-color: rgba(0,136,204,0.3); color: #0088cc; }
  .si-telegram::after { background: rgba(0,136,204,0.15); }
  .si-telegram:hover { box-shadow: 0 0 24px rgba(0,136,204,0.4); border-color: rgba(0,136,204,0.6); }

  .si-youtube { background: rgba(255,0,0,0.1); border-color: rgba(255,0,0,0.25); color: #ff3333; }
  .si-youtube::after { background: rgba(255,0,0,0.12); }
  .si-youtube:hover { box-shadow: 0 0 24px rgba(255,0,0,0.35); border-color: rgba(255,0,0,0.5); }

  .si-instagram { background: rgba(228,64,95,0.1); border-color: rgba(228,64,95,0.25); color: #e4405f; }
  .si-instagram::after { background: rgba(228,64,95,0.12); }
  .si-instagram:hover { box-shadow: 0 0 24px rgba(228,64,95,0.35); border-color: rgba(228,64,95,0.5); }

  .si-facebook { background: rgba(24,119,242,0.1); border-color: rgba(24,119,242,0.25); color: #1877f2; }
  .si-facebook::after { background: rgba(24,119,242,0.12); }
  .si-facebook:hover { box-shadow: 0 0 24px rgba(24,119,242,0.35); border-color: rgba(24,119,242,0.5); }

  .si-blog { background: rgba(255,102,0,0.1); border-color: rgba(255,102,0,0.25); color: #ff6600; }
  .si-blog::after { background: rgba(255,102,0,0.12); }
  .si-blog:hover { box-shadow: 0 0 24px rgba(255,102,0,0.35); border-color: rgba(255,102,0,0.5); }

  .social-label {
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--text-muted);
    transition: color var(--transition);
    letter-spacing: 0.04em;
  }
  .social-link:hover .social-label { color: var(--text-secondary); }

  /* ── Copyright Footer ── */
  .footer-line {
    font-size: 0.72rem;
    color: var(--text-muted);
    text-align: center;
    padding-top: 10px;
    border-top: 1px solid rgba(255,255,255,0.04);
    width: 100%;
    animation: fadeSlideUp 1s var(--transition) 0.5s both;
    line-height: 1.9;
  }
  .footer-line span { color: rgba(255,179,0,0.5); }

  /* ── Divider ── */
  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,229,255,0.2), rgba(255,179,0,0.2), transparent);
  }

  /* ── Keyframes ── */
  @keyframes fadeSlideDown {
    from { opacity:0; transform: translateY(-20px); }
    to   { opacity:1; transform: translateY(0); }
  }
  @keyframes fadeSlideUp {
    from { opacity:0; transform: translateY(20px); }
    to   { opacity:1; transform: translateY(0); }
  }

  /* ── Scanline Overlay ── */
  .scanline {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .page-wrapper { padding: 28px 16px 48px; gap: 28px; }
    .exam-card    { padding: 24px 20px; }
    .cta-btn      { padding: 18px 28px; width: 100%; justify-content: center; }
    .contact-buttons { flex-direction: column; }
    .contact-btn  { justify-content: center; }
    .social-grid  { gap: 12px; }
    .social-icon-wrap { width: 50px; height: 50px; font-size: 1.3rem; border-radius: 14px; }
    .card-header  { flex-wrap: wrap; }
  }

  /* ── SVG Icons inline ── */
  .icon-svg { width: 1.1em; height: 1.1em; display: inline-block; vertical-align: middle; }
</style>
</head>
<body>

<!-- Background -->
<canvas id="particle-canvas"></canvas>
<div class="scanline"></div>
<div class="blob blob-cyan"></div>
<div class="blob blob-amber"></div>
<div class="blob blob-blue"></div>

<div class="page-wrapper">

  <!-- Badge -->
  <div class="expertise-badge">
    <span class="badge-dot"></span>
    خبرة في التدريس والتميز منذ عام 2006 — ٢٠ عاماً من البناء والعطاء
  </div>

  <!-- Profile Orb -->
  <div class="profile-orb-wrapper">
    <div class="orb-ring"></div>
    <div class="orb-ring-2"></div>
    <div class="profile-orb">⚛️</div>
  </div>

  <!-- Hero -->
  <header class="hero">
    <h1 class="hero-title">بوابة الفيزياء الحديثة<br>للاختبارات التفاعلية</h1>
    <p class="hero-subtitle">
      تحت إشراف <strong>الأستاذ وليد خالد الفتلاوي</strong><br>
      مؤسس متوسطة رؤيا الأهلية للبنين في السيدية
    </p>
  </header>

  <div class="divider"></div>

  <!-- Exam Guidelines Card -->
  <div class="exam-card">
    <div class="card-header">
      <div class="card-icon">📋</div>
      <div>
        <div class="card-title">لوحة إرشادات الامتحان</div>
        <div class="card-subtitle-badge">الصف السادس العلمي</div>
      </div>
    </div>
    <ul class="guidelines-list">
      <li class="guideline-item">
        <div class="guideline-num">١</div>
        <div class="guideline-text">
          <strong>القراءة بتمعّن:</strong> راجع القوانين والملاحظات الذهبية جيداً قبل الضغط على زر البدء، فالاستعداد المسبق يُحدث الفارق.
        </div>
      </li>
      <li class="guideline-item">
        <div class="guideline-num">٢</div>
        <div class="guideline-text">
          <strong>التركيز والوقت:</strong> الاختبارات محددة بزمن دقيق لمحاكاة أجواء الامتحان الوزاري بواقعية عالية.
        </div>
      </li>
      <li class="guideline-item">
        <div class="guideline-num">٣</div>
        <div class="guideline-text">
          <strong>التغذية الراجعة:</strong> استثمر الشرح العلمي الذي يظهر بعد كل سؤال لفهم فكرة الحل وتعزيز استيعابك.
        </div>
      </li>
      <li class="guideline-item">
